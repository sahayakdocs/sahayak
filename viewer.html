<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .dash-header { background: #1a73e8; color: white; padding: 25px; border-radius: 15px; text-align: center; }
        .card-box { background: white; padding: 20px; border-radius: 15px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .btn { display: block; background: #1a73e8; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="dash-header">
    <h2>My Smart Dashboard</h2>
    <p>Sahayak Documentation</p>
</div>

<div id="secureContent" style="display:none;">
    <div class="card-box">
        <h3>🔍 My Documents</h3>
        <a href="https://drive.google.com/drive/u/0/search?q=Uploaded_Documents" target="_blank" class="btn">VIEW ALL DOCUMENTS</a>
    </div>
    <div class="card-box">
        <p style="font-size:12px; color:green;">✅ आप अपनी सुरक्षित आईडी से लॉगिन हैं।</p>
        <button onclick="logout()" style="background:#888; color:white; border:none; padding:5px; border-radius:5px;">Logout</button>
    </div>
</div>

<div id="loading" style="text-align:center; margin-top:50px;">
    पहुंच की जांच हो रही है... 🛡️
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyBSB5o1YN8oAnY3X7P4RXHZcnVlyAu2YGs", authDomain: "sdm-scanner-cb292.firebaseapp.com", projectId: "sdm-scanner-cb292", appId: "1:292373162631:web:bcc197ff516eb435b4a622" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(async (user) => {
    const savedRef = localStorage.getItem('lockedRef');
    if (!user || !savedRef) {
        alert("कृपया पहले फ्रंट क्यूआर से लॉगिन करें!");
        window.location.href = 'index.html';
        return;
    }

    const doc = await db.collection('activated_cards').doc(savedRef).get();
    if (doc.exists && doc.data().ownerEmail === user.email) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('secureContent').style.display = 'block';
    } else {
        alert("Access Denied: गलत ईमेल आईडी!");
        auth.signOut().then(() => window.location.href = 'index.html');
    }
});

function logout() {
    localStorage.removeItem('lockedRef');
    auth.signOut().then(() => location.reload());
}
</script>
</body>
</html>
