<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .dash-header { background: #1a73e8; color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .card-box { background: white; padding: 20px; border-radius: 15px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .btn { display: block; background: #1a73e8; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 10px; }
        .loc-list { text-align: left; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dash-header">
    <h2>My Smart Dashboard</h2>
    <p>SAHAYAK DOCUMENTATION</p>
</div>

<div class="card-box">
    <h3>🔍 Documents</h3>
    <a href="https://drive.google.com/drive/u/0/search?q=Uploaded_Documents" target="_blank" class="btn">VIEW ALL DOCUMENTS</a>
    <p style="font-size:12px; color:#666;">Note: Use your registered Gmail to view files.</p>
</div>

<div id="locationBox" class="card-box">
    <h3>📍 Saved Locations</h3>
    <div id="locDisplay" class="loc-list">Loading locations...</div>
    <button onclick="localStorage.removeItem('saved_locs'); location.reload();" style="font-size:10px; color:red; border:none; background:none;">Clear All</button>
</div>

<script>
    window.onload = () => {
        let locs = JSON.parse(localStorage.getItem('saved_locs') || "[]");
        let display = document.getElementById('locDisplay');
        if(locs.length === 0) { display.innerHTML = "No locations saved yet."; }
        else {
            display.innerHTML = locs.map(l => `<div><b>${l.name}</b>: <a href="${l.url}" target="_blank">Open Map</a> (${l.date})</div>`).join('<hr>');
        }
    };
</script>

<div class="footer" style="text-align:center; margin-top:20px; font-size:11px; color:#888;">
    © 2026 Sahayak Docs - Najafgarh
</div>

</body>
</html>
