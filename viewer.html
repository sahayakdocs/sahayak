<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .dash-header { background: #1a73e8; color: white; padding: 25px; border-radius: 15px; text-align: center; }
        .card-box { background: white; padding: 20px; border-radius: 15px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .btn { display: block; background: #1a73e8; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 10px; }
        .loc-item { text-align: left; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid #34a853; }
    </style>
</head>
<body>

<div class="dash-header">
    <h2>Sahayak Smart Dashboard</h2>
    <p>DIGITAL SECURITY PARTNER</p>
</div>

<div class="card-box">
    <h3>🔍 My Documents</h3>
    <a href="https://drive.google.com/drive/u/0/search?q=Uploaded_Documents" target="_blank" class="btn">SEARCH ALL DOCUMENTS</a>
</div>

<div class="card-box">
    <h3>📍 Saved Locations</h3>
    <div id="locDisplay">Loading...</div>
    <button onclick="localStorage.removeItem('saved_locs'); location.reload();" style="margin-top:10px; color:red; border:none; background:none; font-size:10px;">Clear All Locations</button>
</div>

<script>
    window.onload = () => {
        let locs = JSON.parse(localStorage.getItem('saved_locs') || "[]");
        let display = document.getElementById('locDisplay');
        if(locs.length === 0) { display.innerHTML = "No locations saved."; }
        else {
            display.innerHTML = locs.map(l => `<div class="loc-item"><b>${l.name}</b><br><a href="${l.url}" target="_blank">Open on Google Maps</a><br><small>${l.date}</small></div>`).join('');
        }
    };
</script>

</body>
</html>
