<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak Docs - High Quality Scanner</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f7; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { background: white; width: 92%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #1a73e8; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; color: #1a73e8; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .upi-box { background: #fff9c4; border: 1px dashed #fbc02d; padding: 12px; border-radius: 10px; margin: 10px 0; font-size: 13px; }
        .wa-btn { background: #25D366 !important; margin-top: 5px; }
        #scanSection { display: none; }
        video { width: 100%; border-radius: 15px; background: #000; margin-bottom: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div class="logo">SAHAYAK DOCS</div>
    <div style="font-size:10px; color:#666; margin-bottom:20px;">SMART DOCUMENTS MANAGEMENT SYSTEM</div>

    <div id="loginSection">
        <input type="text" id="refId" placeholder="Ref. ID (from Card)" maxlength="8">
        
        <div class="upi-box">
            <b>Activation Fee: ₹50</b><br>
            <a href="upi://pay?pa=8700407760@okbizaxis&pn=SahayakDocs&am=50" style="color:#d32f2f; font-weight:bold; text-decoration:none;">[ CLICK TO PAY ₹50 ]</a>
            <button class="wa-btn" onclick="verifyOnWhatsApp()">✅ Verify on WhatsApp</button>
        </div>

        <input type="password" id="sdPass" placeholder="Enter 6-Digit SD Password">
        <button onclick="checkAndLogin()">Activate & Start Scanner</button>
        <p style="font-size:11px; color:#888; margin-top:15px;">Admin: Manish Kumar | 8882897071</p>
    </div>

    <div id="scanSection">
        <video id="v" autoplay playsinline></video>
        <canvas id="c"></canvas>
        <button onclick="takeSnap()">📸 Capture & Auto-Enhance</button>
        <button onclick="window.location.href='https://drive.google.com/drive/u/0/search?q=Uploaded_Documents'" style="background:#34a853; margin-top:10px;">📂 View My Documents</button>
        <p id="status" style="font-size:12px; color:blue;"></p>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBSB5o1YN8oAnY3X7P4RXHZcnVlyAu2YGs",
  authDomain: "sdm-scanner-cb292.firebaseapp.com",
  projectId: "sdm-scanner-cb292",
  appId: "1:292373162631:web:bcc197ff516eb435b4a622"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 1. ऑटो-रिफिल Ref ID
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const ref = params.get('ref');
    if(ref) {
        document.getElementById('refId').value = ref;
        document.getElementById('refId').readOnly = true;
    }
};

// 2. WhatsApp Verification
function verifyOnWhatsApp() {
    const ref = document.getElementById('refId').value || "NEW_CARD";
    const msg = `Sir, my Ref ID is ${ref}, I have paid ₹50. Please send me the SD Password.`;
    window.open(`https://wa.me/918700407760?text=${encodeURIComponent(msg)}`, '_blank');
}

// 3. Login & Activation
async function checkAndLogin() {
    const ref = document.getElementById('refId').value;
    const pass = document.getElementById('sdPass').value;
    
    let total = (parseInt(ref[4])*5) + (parseInt(ref[6])*7) + (parseInt(ref[7])*8);
    let calc = "SD" + total.toString().padStart(4, '0');
    
    if(pass !== calc) { alert("Wrong Password! Payment check karein ya call karein."); return; }

    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/drive.file');

    try {
        const res = await firebase.auth().signInWithPopup(provider);
        const user = res.user;
        const cardRef = db.collection('cards').doc(ref);
        const doc = await cardRef.get();
        
        if(doc.exists() && doc.data().owner !== user.email) {
            alert("This card is already linked to another email!");
        } else {
            await cardRef.set({ owner: user.email, activated: true });
            document.getElementById('loginSection').style.display='none';
            document.getElementById('scanSection').style.display='block';
            startCamera();
        }
    } catch(e) { alert("Login Error: " + e.message); }
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{document.getElementById('v').srcObject=s;});
}

// 4. Capture with High Quality Filter
function takeSnap() {
    const v = document.getElementById('v'), c = document.getElementById('c'), st = document.getElementById('status');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');

    // --- क्वालिटी सुधारने वाला फ़िल्टर ---
    ctx.filter = 'contrast(1.4) brightness(1.1) saturate(0.9)'; 
    ctx.drawImage(v, 0, 0, c.width, c.height);
    ctx.filter = 'none'; // फ़िल्टर रीसेट

    const data = c.toDataURL('image/jpeg', 0.9); // 90% High Quality
    const url = "https://script.google.com/macros/s/AKfycbzpEL_z0pybQye9Q0nt1u7j1P81xufRZBV9OMux6gV5-hg7dS0y5f7Ydcl-s7FF-3EC/exec";
    
    st.innerText = "Processing & Saving... ⏳";
    fetch(url,{method:'POST',mode:'no-cors',body:JSON.stringify({data:data,name:"Sahayak_"+Date.now()+".jpg"})})
    .then(()=>{
        st.innerText = "Success! Saved in Drive. ✅";
        alert("Document Saved Successfully!");
    });
}
</script>
</body>
</html>
