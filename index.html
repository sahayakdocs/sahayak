<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak Smart Locker</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: white; width: 95%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; border-top: 8px solid #1a73e8; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #scanSection, #loginSection { display: none; }
        video { width: 100%; border-radius: 15px; background: #000; }
        .preview-count { font-size: 12px; color: #d32f2f; font-weight: bold; margin: 5px 0; }
        .btn-pdf { background: #e67e22 !important; margin-top: 10px; }
        .loader { color: #1a73e8; font-weight: bold; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <div id="statusMsg" class="loader">System Loading...</div>

    <div id="loginSection">
        <h2 style="color:#1a73e8;">Activate Card</h2>
        <input type="text" id="refId" placeholder="Ref. ID from Card">
        <input type="password" id="sdPass" placeholder="Enter SD Password">
        <button onclick="checkAndLogin()">Activate & Lock Email</button>
    </div>

    <div id="scanSection">
        <div style="font-size:18px; font-weight:bold; color:#1a73e8; margin-bottom:10px;">Smart Scanner</div>
        
        <input type="text" id="fileName" placeholder="File Name (e.g. My Aadhaar)">
        
        <video id="v" autoplay playsinline></video>
        <canvas id="c" style="display:none;"></canvas>
        
        <div class="preview-count" id="pageCount">Pages Captured: 0</div>
        
        <button onclick="takeSnap()">📸 Capture Page</button>
        <button id="savePdfBtn" class="btn-pdf" onclick="uploadAsPdf()" style="display:none;">📄 Save as PDF (All Pages)</button>
        
        <button onclick="window.location.href='viewer.html'" style="background:#34a853; margin-top:10px;">📂 My Dashboard</button>
        <button onclick="logout()" style="background:#888; font-size:10px; padding:5px; margin-top:20px;">Logout / Change Email</button>
        <div id="uploadStatus" class="loader"></div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyBSB5o1YN8oAnY3X7P4RXHZcnVlyAu2YGs", authDomain: "sdm-scanner-cb292.firebaseapp.com", projectId: "sdm-scanner-cb292", appId: "1:292373162631:web:bcc197ff516eb435b4a622" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let capturedPages = []; // मल्टीपल पेज स्टोर करने के लिए

window.onload = async () => {
    const savedRef = localStorage.getItem('lockedRef');
    const urlRef = new URLSearchParams(window.location.search).get('ref');

    // अगर पहले से लॉगइन है तो डायरेक्ट कैमरा खोलें
    auth.onAuthStateChanged(async (user) => {
        if (user && savedRef) {
            showScanner();
        } else {
            document.getElementById('statusMsg').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            if(urlRef) { 
                document.getElementById('refId').value = urlRef;
                document.getElementById('refId').readOnly = true;
            }
        }
    });
};

async function checkAndLogin() {
    const ref = document.getElementById('refId').value;
    const pass = document.getElementById('sdPass').value;
    let total = (parseInt(ref[4])*5) + (parseInt(ref[6])*7) + (parseInt(ref[7])*8);
    if(pass !== "SD" + total.toString().padStart(4, '0')) { alert("Wrong Password!"); return; }

    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/drive.file');

    try {
        const res = await auth.signInWithPopup(provider);
        const user = res.user;
        const cardRef = db.collection('activated_cards').doc(ref);
        const doc = await cardRef.get();

        if(doc.exists && doc.data().ownerEmail !== user.email) {
            alert("यह कार्ड किसी और ईमेल से लिंक है!");
            await auth.signOut();
            return;
        }

        await cardRef.set({ ownerEmail: user.email, activatedOn: new Date().toISOString() });
        localStorage.setItem('lockedRef', ref); // Ref ID याद रखें
        showScanner();
    } catch(e) { alert(e.message); }
}

function showScanner() {
    document.getElementById('statusMsg').style.display = 'none';
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('scanSection').style.display = 'block';
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>document.getElementById('v').srcObject=s);
}

// फोटो खींचना (मल्टी-पेज सपोर्ट)
function takeSnap() {
    const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
    c.width = v.videoWidth; c.height = v.videoHeight;
    ctx.filter = 'contrast(1.3) brightness(1.1)'; 
    ctx.drawImage(v, 0, 0);
    
    const data = c.toDataURL('image/jpeg', 0.8);
    capturedPages.push(data);
    
    document.getElementById('pageCount').innerText = "Pages Captured: " + capturedPages.length;
    document.getElementById('savePdfBtn').style.display = 'block';
}

// PDF बनाना और अपलोड करना
async function uploadAsPdf() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const fileName = document.getElementById('fileName').value || "SmartDoc_" + Date.now();
    const status = document.getElementById('uploadStatus');

    status.innerText = "PDF बना रहे हैं... ⏳";

    capturedPages.forEach((pageData, index) => {
        if (index > 0) doc.addPage();
        const imgProps = doc.getImageProperties(pageData);
        const pdfWidth = doc.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        doc.addImage(pageData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
    });

    const pdfBase64 = doc.output('datauristring').split(',')[1];
    status.innerText = "Drive में सेव हो रहा है... 🚀";

    fetch("https://script.google.com/macros/s/AKfycbzIz-80FoLcZdhAqkZCmMR9164npnp3xcc7OKrKp4jvv5xUI3cl5FfuPZQKuSbQTwIG/exec", {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ data: pdfBase64, name: fileName + ".pdf", type: "application/pdf" })
    }).then(() => {
        status.innerText = "PDF सुरक्षित सेव हो गया! ✅";
        capturedPages = [];
        document.getElementById('pageCount').innerText = "Pages Captured: 0";
        document.getElementById('savePdfBtn').style.display = 'none';
        alert("PDF Saved Successfully!");
    });
}

function logout() {
    localStorage.removeItem('lockedRef');
    auth.signOut().then(() => location.reload());
}
</script>
</body>
</html>
