<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const ref = params.get('ref');

    if (ref) {
        document.getElementById('refId').value = ref;
        document.getElementById('refId').readOnly = true;
    }
};

// WhatsApp Verification
function verifyOnWhatsApp() {

    const ref = document.getElementById('refId').value || "NEW_CARD";

    const msg =
`Sir, my Ref ID is ${ref}.
I have paid ₹50.
Please send my SD Password.`;

    window.open(
        `https://wa.me/918700407760?text=${encodeURIComponent(msg)}`,
        '_blank'
    );
}

// SD Password Generator
function generateSD(ref) {

    // Ref must be exactly 8 digits
    if (!/^\d{8}$/.test(ref)) {
        return null;
    }

    let total =
        (parseInt(ref[4]) * 5) +
        (parseInt(ref[6]) * 7) +
        (parseInt(ref[7]) * 8);

    return "SD" + total.toString().padStart(4, '0');
}

// Login
async function checkAndLogin() {

    const ref = document.getElementById('refId').value.trim();
    const pass = document.getElementById('sdPass').value.trim();

    // Validation
    if (!/^\d{8}$/.test(ref)) {
        alert("Ref ID must be 8 digits.");
        return;
    }

    const calc = generateSD(ref);

    if (pass !== calc) {
        alert("Wrong SD Password!");
        return;
    }

    const provider = new firebase.auth.GoogleAuthProvider();

    provider.addScope(
        'https://www.googleapis.com/auth/drive.file'
    );

    try {

        const res =
            await firebase.auth().signInWithPopup(provider);

        const user = res.user;

        const cardRef =
            db.collection('cards').doc(ref);

        const doc = await cardRef.get();

if (
    doc.exists &&
    doc.data() &&
    doc.data().owner &&
    doc.data().owner !== user.email
) {
    alert("This card is already linked to another email!");
    return;
}

        await cardRef.set({
            owner: user.email,
            activated: true,
            activatedAt: new Date().toISOString()
        });

        document.getElementById('loginSection').style.display = 'none';

        document.getElementById('scanSection').style.display = 'block';

        startCamera();

    } catch (e) {

        alert("Login Error: " + e.message);
    }
}

// Camera Start
function startCamera() {

    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "environment"
        }
    })
    .then(stream => {

        window.currentStream = stream;

        document.getElementById('v').srcObject = stream;
    })
    .catch(err => {

        alert("Camera Error: " + err.message);
    });
}

// Capture
async function takeSnap() {

    const btn = event.target;

    btn.disabled = true;

    const v = document.getElementById('v');

    const c = document.getElementById('c');

    const st = document.getElementById('status');

    c.width = v.videoWidth;
    c.height = v.videoHeight;

    const ctx = c.getContext('2d');

    // Enhance Quality
    ctx.filter =
        'contrast(1.4) brightness(1.1) saturate(0.9)';

    ctx.drawImage(v, 0, 0, c.width, c.height);

    ctx.filter = 'none';

    const data =
        c.toDataURL('image/jpeg', 0.95);

    st.innerText = "Uploading... ⏳";

    try {

        const res = await fetch(
            "YOUR_APPS_SCRIPT_URL",
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    data: data,
                    fileName:
                        "Sahayak_" + Date.now() + ".jpg"
                })
            }
        );

        st.innerText =
            "Saved Successfully ✅";

        alert("Document Saved!");

    } catch (err) {

        st.innerText =
            "Upload Failed ❌";

        alert(err.message);

    }

    btn.disabled = false;
}
</script>
